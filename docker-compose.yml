services:
  db:
    image: postgres:16
    container_name: family_finance_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: ./app
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    container_name: family_finance_web
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./app:/app
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_PORT}:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"

  opend:
    profiles:
      - futu
    build:
      context: ./opend
      args:
        OPEND_BASE_IMAGE: ${OPEND_BASE_IMAGE:-docker.1ms.run/library/ubuntu:22.04}
        SUPPORT_IMAGE: ${OPEND_SUPPORT_IMAGE:-docker.m.daocloud.io/library/python:3.12-slim}
    container_name: family_finance_opend
    restart: unless-stopped
    environment:
      FUTU_LOGIN_ACCOUNT: ${FUTU_LOGIN_ACCOUNT:-}
      FUTU_LOGIN_PWD_MD5: ${FUTU_LOGIN_PWD_MD5:-}
    volumes:
      - ./opend/runtime:/opt/futu:ro
      - ./opend/state:/var/lib/futu
    expose:
      - "11111"
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/11111'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
