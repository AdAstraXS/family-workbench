{% extends "base.html" %}

{% block title %}家庭成员{% endblock %}

{% block content %}
<section class="panel">
  <h1>家庭成员</h1>
  <table>
    <thead><tr><th>名称</th><th>家庭</th><th>角色</th><th>状态</th></tr></thead>
    <tbody>
      {% for member in members %}
        <tr><td>{{ member.display_name }}</td><td>{{ member.family }}</td><td>{{ member.get_role_display }}</td><td>{{ member.is_active }}</td></tr>
      {% empty %}
        <tr><td colspan="4">暂无数据，请先到后台录入。</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
