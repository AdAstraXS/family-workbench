{% extends "base.html" %}

{% block title %}证券标的{% endblock %}

{% block content %}
<section class="panel">
  <div class="section-head">
    <h1>证券标的</h1>
    <a class="button" href="{% url 'portfolio:security_create' %}">新增证券标的</a>
  </div>
  <table>
    <thead><tr><th>代码</th><th>名称</th><th>市场</th><th>类型</th><th>币种</th><th>操作</th></tr></thead>
    <tbody>
      {% for security in securities %}
        <tr><td>{{ security.symbol }}</td><td>{{ security.name }}</td><td>{{ security.market }}</td><td>{{ security.asset_type }}</td><td>{{ security.currency }}</td><td><a href="{% url 'portfolio:security_edit' security.id %}">编辑</a></td></tr>
      {% empty %}
        <tr><td colspan="6">暂无数据</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
